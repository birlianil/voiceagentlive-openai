openapi: 3.0.3
info:
  title: VA Voice Platform Tool Backend API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:4010
  - url: http://127.0.0.1:4011
security:
  - ToolsApiBearer: []
  - {}
paths:
  /health:
    get:
      operationId: toolsHealth
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /search:
    get:
      operationId: searchKb
      summary: Legacy knowledge search endpoint (prefer /kb/search)
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Search response
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        text:
                          type: string
                      required: [id, title, text]
                required: [query, results]

  /kb/ingest:
    post:
      operationId: kbIngest
      summary: Ingest or update a document in the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KbIngestRequest'
      responses:
        '200':
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KbIngestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /kb/search:
    post:
      operationId: kbSearch
      summary: Hybrid knowledge base retrieval (keyword + optional semantic rerank)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KbSearchRequest'
      responses:
        '200':
          description: Retrieval result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KbSearchResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /kb/documents:
    get:
      operationId: kbListDocuments
      summary: List ingested knowledge base documents
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
          required: false
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/KbDocumentSummary'
                required: [ok, count, documents]

  /contact:
    post:
      operationId: saveContact
      summary: Save contact info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
              required: [name, email]
      responses:
        '200':
          description: Contact saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkId'

  /appointments:
    post:
      operationId: createAppointment
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                datetimeISO:
                  type: string
                reason:
                  type: string
              required: [name, email, datetimeISO]
      responses:
        '200':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkId'

  /calendar/availability:
    post:
      operationId: checkCalendarAvailability
      summary: Check available slots
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dateFromISO:
                  type: string
                dateToISO:
                  type: string
                preferredTimeOfDay:
                  type: string
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  query:
                    type: object
                    properties:
                      dateFromISO:
                        type: string
                      dateToISO:
                        type: string
                      preferredTimeOfDay:
                        type: string
                    required: [dateFromISO, dateToISO, preferredTimeOfDay]
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        datetimeISO:
                          type: string
                        available:
                          type: boolean
                      required: [datetimeISO, available]
                required: [ok, query, slots]

  /calendar/book:
    post:
      operationId: bookCalendar
      summary: Book appointment slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                datetimeISO:
                  type: string
                appointmentType:
                  type: string
                facility:
                  type: string
                reason:
                  type: string
                name:
                  type: string
                email:
                  type: string
              required: [datetimeISO]
      responses:
        '200':
          description: Booking result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  datetimeISO:
                    type: string
                  appointmentType:
                    type: string
                  facility:
                    type: string
                required: [ok, id, datetimeISO]
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /retell/send_call_summary_email:
    post:
      operationId: sendCallSummaryEmail
      summary: Queue call summary email event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                email:
                  type: string
                customer_name:
                  type: string
              required: [summary]
      responses:
        '200':
          description: Event queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetellResponse'

  /retell/transfer_call:
    post:
      operationId: transferCall
      summary: Transfer call event
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                target:
                  type: string
      responses:
        '200':
          description: Transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetellResponse'

  /retell/press_digit_medrics:
    post:
      operationId: pressDigitMedrics
      summary: Ask caller to press digit 5
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Digit prompt event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetellResponse'

  /retell/end_call:
    post:
      operationId: endCall
      summary: End call event
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetellResponse'

  /internal/events:
    get:
      operationId: listInternalEvents
      summary: List recent tool events (internal)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
          required: false
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        status:
                          type: string
                        payload:
                          type: object
                          additionalProperties: true
                        ts:
                          type: integer
                      required: [id, type, status, payload, ts]
                required: [ok, count, events]

components:
  securitySchemes:
    ToolsApiBearer:
      type: http
      scheme: bearer
  schemas:
    OkId:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: string
      required: [ok, id]
    KbIngestRequest:
      type: object
      properties:
        documentId:
          type: string
        title:
          type: string
        source:
          type: string
        externalRef:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        embed:
          type: boolean
        chunkSize:
          type: integer
        chunkOverlap:
          type: integer
      required: [content]
    KbIngestResponse:
      type: object
      properties:
        ok:
          type: boolean
        documentId:
          type: string
        sectionCount:
          type: integer
        embeddedCount:
          type: integer
        contentHash:
          type: string
      required: [ok, documentId, sectionCount, embeddedCount, contentHash]
    KbSearchRequest:
      type: object
      properties:
        query:
          type: string
        source:
          type: string
        topK:
          type: integer
      required: [query]
    KbDocumentSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        externalRef:
          type: string
        updatedAt:
          type: string
          format: date-time
        sectionCount:
          type: integer
      required: [id, title, source, updatedAt, sectionCount]
    KbSearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        query:
          type: string
        topK:
          type: integer
        totalCandidates:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              sectionId:
                type: string
              documentId:
                type: string
              title:
                type: string
              source:
                type: string
              snippet:
                type: string
              content:
                type: string
              score:
                type: object
                properties:
                  fused:
                    type: number
                  keyword:
                    type: number
                  semantic:
                    type: number
                required: [fused, keyword, semantic]
              citation:
                type: object
                properties:
                  documentId:
                    type: string
                  sectionId:
                    type: string
                  title:
                    type: string
                  source:
                    type: string
                required: [documentId, sectionId, title, source]
              metadata:
                type: object
                properties:
                  document:
                    type: object
                    additionalProperties: true
                  section:
                    type: object
                    additionalProperties: true
                required: [document, section]
            required: [sectionId, documentId, title, source, snippet, content, score, citation, metadata]
      required: [ok, query, topK, totalCandidates, results]
    RetellResponse:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: string
        status:
          type: string
        action:
          type: string
        digit:
          type: string
        queueStatus:
          type: string
        ended:
          type: boolean
      required: [ok, id]
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
      required: [ok, error]
