services:
  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0", "--node-ip", "127.0.0.1", "--udp-port", "7882"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50100:50000-50100/udp"

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  db-mock:
    build: ./apps/db-mock
    environment:
      - PORT=4010
    ports:
      - "4010:4010"

  tools-api-starter:
    build: ./apps/tools-api-starter
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=${TOOLS_API_STARTER_PORT:-4011}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/va_voice}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - TOOLS_API_CORS_ORIGIN=${TOOLS_API_CORS_ORIGIN:-*}
      - TOOLS_API_REQUIRE_AUTH=${TOOLS_API_REQUIRE_AUTH:-false}
      - TOOLS_API_AUTH_TOKEN=${TOOLS_API_AUTH_TOKEN:-}
      - KB_ENABLED=${KB_ENABLED:-true}
      - KB_TOP_K=${KB_TOP_K:-5}
      - KB_KEYWORD_CANDIDATES=${KB_KEYWORD_CANDIDATES:-40}
      - KB_CHUNK_SIZE=${KB_CHUNK_SIZE:-900}
      - KB_CHUNK_OVERLAP=${KB_CHUNK_OVERLAP:-120}
      - KB_KEYWORD_WEIGHT=${KB_KEYWORD_WEIGHT:-0.35}
      - KB_SEMANTIC_WEIGHT=${KB_SEMANTIC_WEIGHT:-0.65}
      - KB_EMBEDDING_MODEL=${KB_EMBEDDING_MODEL:-text-embedding-3-small}
      - KB_EMBEDDING_TIMEOUT_MS=${KB_EMBEDDING_TIMEOUT_MS:-12000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - TOOLS_WEBHOOK_URL=${TOOLS_WEBHOOK_URL:-}
      - TOOLS_WEBHOOK_SECRET=${TOOLS_WEBHOOK_SECRET:-}
      - TOOLS_WEBHOOK_TIMEOUT_MS=${TOOLS_WEBHOOK_TIMEOUT_MS:-4000}
      - TOOLS_WEBHOOK_MAX_ATTEMPTS=${TOOLS_WEBHOOK_MAX_ATTEMPTS:-5}
      - TOOLS_WEBHOOK_BACKOFF_MS=${TOOLS_WEBHOOK_BACKOFF_MS:-1000}
    ports:
      - "${TOOLS_API_STARTER_PORT:-4011}:${TOOLS_API_STARTER_PORT:-4011}"

  postgres:
    image: postgres:16-alpine
    profiles: ["tools"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-va_voice}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-va_voice}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["tools"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  stt-svc:
    build: ./apps/stt-svc
    profiles: ["local-audio"]
    environment:
      - PORT=4020
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-5}
      - WHISPER_BEST_OF=${WHISPER_BEST_OF:-5}
      - WHISPER_TEMPERATURE=${WHISPER_TEMPERATURE:-0.0}
    ports:
      - "4020:4020"

  tts-svc:
    build: ./apps/tts-svc
    profiles: ["local-audio"]
    environment:
      - PORT=4030
      - PIPER_MODEL=${PIPER_MODEL:-en_US-amy-medium}
      - PIPER_MODEL_URL=${PIPER_MODEL_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx}
      - PIPER_CONFIG_URL=${PIPER_CONFIG_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx.json}
      - PIPER_VOICE_DIR=/models
    ports:
      - "4030:4030"
    volumes:
      - piper_models:/models

volumes:
  ollama_data:
  piper_models:
  postgres_data:
