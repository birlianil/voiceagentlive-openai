name: Developer Kit

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**

jobs:
  build-developer-kit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package developer kit
        run: pnpm pack:devkit

      - name: Upload developer-kit artifact
        uses: actions/upload-artifact@v4
        with:
          name: va-voice-developer-kit
          path: dist/*.tar.gz
          if-no-files-found: error
