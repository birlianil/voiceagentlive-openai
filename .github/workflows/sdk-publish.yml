name: SDK Publish

on:
  workflow_dispatch:
    inputs:
      registry_url:
        description: npm registry URL
        required: false
        default: https://npm.pkg.github.com

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @va-platform/voice-sdk build

      - name: Validate GitHub Packages scope
        if: ${{ (github.event.inputs.registry_url || 'https://npm.pkg.github.com') == 'https://npm.pkg.github.com' }}
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/va-platform-sdk/package.json').name")
          PACKAGE_SCOPE=$(echo "$PACKAGE_NAME" | cut -d'/' -f1 | tr -d '@' | tr '[:upper:]' '[:lower:]')
          OWNER_SCOPE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "$PACKAGE_SCOPE" != "$OWNER_SCOPE" ]; then
            echo "Package scope @$PACKAGE_SCOPE must match GitHub owner @$OWNER_SCOPE for npm.pkg.github.com publishing."
            echo "Use another registry URL or rename package scope."
            exit 1
          fi

      - name: Publish SDK
        working-directory: packages/va-platform-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REGISTRY_URL: ${{ github.event.inputs.registry_url || 'https://npm.pkg.github.com' }}
        run: npm publish --registry "$REGISTRY_URL" --access restricted
